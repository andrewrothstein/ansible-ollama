---
# vars file for ollama
ollama_os: '{{ ansible_facts["system"] | lower }}'
ollama_arch: '{{ ollama_arch_map[ansible_facts["architecture"]] }}'
ollama_platform: '{{ ollama_os }}-{{ ollama_arch }}'
# Determine archive extension: .tgz for versions <= 0.13.5, .tar.zst for versions >= 0.14.0
ollama_archive_ext: >-
  {%- if ollama_ver | version_compare('0.14.0', '>=') -%}
    tar.zst
  {%- else -%}
    tgz
  {%- endif -%}
ollama_url: '{{ ollama_mirror }}/v{{ ollama_ver }}/ollama-{{ ollama_platform }}.{{ ollama_archive_ext }}'
ollama_tmp_tgz: '{{ ollama_tmp_dir | default("/tmp") }}/ollama-{{ ollama_ver }}-{{ ollama_platform }}.{{ ollama_archive_ext }}'
ollama_checksum: '{{ ollama_checksums[ollama_ver][ollama_platform] }}'
ollama_install_dir: '{{ ollama_parent_install_dir }}/ollama-{{ ollama_ver }}-{{ ollama_platform }}'
ollama_exe: '{{ ollama_install_dir }}/bin/ollama'
ollama_link: '{{ ollama_parent_install_dir }}/bin/ollama'
